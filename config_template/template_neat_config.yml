## Template for NEAT's read-simulator (as of version 4.3.5, parallelization-friendly)
## Any parameter that is not required but has a default value will use the
## default value even if the variable is not included in the config. For
## required items, they must be included in the config and they must be given a value.
## All other items can be present or not. If present and the value is set to a single
## period, the variable will be treated as though it had been omitted. Please do
## not modify this template, but instead make a copy in your working directory.
## Run with: neat read-simulator -c <config.yml> -o <out_dir> [-p <prefix>]

# Absolute path to input reference FASTA file
# type = string | required: yes
reference: REQUIRED

# Read length of the reads in the FASTQ output. Only used if produce_fastq = true
# type = int | required: no | default = 151
read_len: .

# Average coverage for the entire genome
# type = int | required: no | default = 10
coverage: .

# Absolute path to file with sequencing error model or quality-score model
# Error models are typically produced by neat model-seq-err (from FASTQ/BAM-like inputs)
# Quality-score models can be produced by neat model-qual-score (optionally fit with --markov)
# type = string | required: no | default: <NEAT_DIR>/neat/models/defaults/default_error_model.pickle.gz
error_model: .

# Average sequencing error rate for the sequencing machine
# type = float | required = no | must be between 0.0 and 0.3
avg_seq_error: .

# Scale quality scores to match avg_seq_error
# type: boolean | required = no | default = false
rescale_qualities: .

# PHRED quality offset (e.g., 33 for Sanger)
# type: int | required = no | default = 33
quality_offset: .

# Desired ploidy
# type = int | required = no | default = 2
ploidy: .

# Absolute path to VCF file containing variants that will always be included
# type: string | required = no
include_vcf: .

# Absolute path to BED file containing reference regions that the simulation should target
# type = string | required = no
target_bed: .

# Absolute path to BED file containing reference regions that the simulation should discard
# type = string | required = no
discard_bed: .

# Absolute path to the mutation model pickle file
# Typically produced by neat gen-mut-model using a reference FASTA and variants VCF
# Uses trinucleotide context and a trinucleotide transition-matrix to select sites/alleles
# type: string | required = no
mutation_model: .

# Average mutation rate per base pair (overrides model mutation rate, if set)
# type: float | required = no | must be between 0.0 and 0.3
mutation_rate: .

# Absolute path to a BED file with mutation rates by region
# Rates must be in the third column and be of the form "mut_rate=x.xx"
# Rates must be between 0.00 and 0.30
# type: string | required = no
mutation_bed: .

# Paired-end output mode
# If true, you must provide either fragment_model OR (fragment_mean + fragment_st_dev)
# type: boolean | required = no | default = false
paired_ended: .

# Absolute path to a pickle file containing the fragment length model
# Typically produced by neat model-fraglen (learned from BAM alignments)
# type: string | required = no | default: <NEAT_DIR>/neat/models/defaults/default_fraglen_model.pickle.gz
fragment_model: .

# Mean paired-end fragment length (used only if paired_ended = true and fragment_model is not set)
# type: float | required: no (unless paired_ended and no fragment_model)
fragment_mean: .

# Standard deviation of paired-end fragment length distribution
# type: float | required: no (unless paired_ended and no fragment_model)
fragment_st_dev: .

# Produce golden BAM file (aligned reads)
# type: boolean | required = no | default = false
produce_bam: .

# Produce golden VCF file (all NEAT-added variants)
# type: boolean | required = no | default = false
produce_vcf: .

# Produce FASTQ output (default output)
# type: boolean | required = no | default = true
produce_fastq: .

# Ignore coverage bias models and force constant coverage (debugging)
# type: boolean | required = no | default = false
no_coverage_bias: .

# RNG seed for reproducibility
# type: int | required = no
rng_seed: .

# Absolute minimum number of mutations (NEAT always adds at least 1)
# type: int | required = no | default = 0
min_mutations: .

# Overwrite output files if they already exist
# type: bool | required = no | default = false
overwrite_output: .

# How to split the input reference for parallelization
# Note: if threads == 1, this option has no effect (treated as contig)
# type = string | required: no | default = contig | values: contig, size
parallel_mode: .

# Target block size if parallel_mode = size (overlap = read_len * 2)
# type = int | required: no | default = 500000 (when parallel_mode=size)
parallel_block_size: .

# Number of worker processes/threads to run
# type = int | required: no | default = 1
threads: .

# If true, delete splits after stitching completes
# Set false to preserve splits in <out_dir>/splits for reuse
# type = bool | required: no | default = true
cleanup_splits: .

# Reuse existing files in '<out_dir>/splits' and skip the split step
# Directory must exist and contain NEAT-generated split files
# type = bool | required: no | default = false
reuse_splits: .
